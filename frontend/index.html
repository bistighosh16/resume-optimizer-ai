<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resume Optimizer AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <h1>🚀 Resume Optimizer AI</h1>
      <p>Match your resume to any job description using AI</p>
    </header>

    <div class="inputs">
      <div class="box">
        <label>📄 Your Resume</label>
        <textarea id="resume" placeholder="Paste your resume here..."></textarea>
      </div>

      <div class="box">
        <label>💼 Job Description</label>
        <textarea id="jobDescription" placeholder="Paste the job description here..."></textarea>
      </div>
    </div>

    <button id="analyzeBtn">✨ Analyze with AI</button>

    <div id="loading" class="hidden">⏳ Analyzing... please wait</div>

    <div id="result" class="hidden">
      <h2>📊 Analysis Result</h2>
      <pre id="resultText"></pre>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="script.js"></script>
</body>
</html>
